<style>
        /* Custom Styles for Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #e9590c;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 0 4px rgba(233, 89, 12, 0.2);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #e8d7ce;
            border-radius: 2px;
        }

        /* Checkbox Custom Styles */
        .checkbox-pill:checked + div {
            background-color: #e9590c;
            color: white;
            border-color: #e9590c;
        }

        .radio-circle:checked + div {
            background-color: #e9590c;
            color: white;
            border-color: #e9590c;
            transform: scale(1.05);
        }

        /* Fade Animation for Question Transition */
        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .animate-fade-in {
            animation: fadeInRight 0.4s ease-out forwards;
        }
    </style>
